name: Build and Publish NuGet

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 .NET 环境
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: 还原依赖
        run: dotnet restore Materal.Gateway.slnx

      - name: 构建项目
        run: dotnet build Materal.Gateway.slnx -c Release --no-restore

      - name: 发布到 NuGet
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "当前工作目录: $(pwd)"
          echo "Packages 目录内容:"
          ls -la Packages/ 2>/dev/null || echo "Packages 目录不存在"
          echo "---"
          if [ -z "$(ls -A Packages/*.nupkg 2>/dev/null)" ]; then
            echo "没有需要发布的包"
            exit 0
          fi
          for nupkg in Packages/*.nupkg; do
            echo "正在发布: $nupkg"
          done
