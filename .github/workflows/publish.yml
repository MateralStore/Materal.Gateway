name: Build and Publish

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: 创建输出目录
        run: mkdir -p Application

      - name: 还原 NuGet 包
        run: dotnet restore Materal.Gateway.slnx

      - name: 打包 NuGet 包
        run: |
          dotnet pack Materal.MergeBlock.Consul/Materal.MergeBlock.Consul.csproj --configuration Release
          dotnet pack Materal.Gateway/Materal.Gateway.csproj --configuration Release

      - name: 发布后端项目
        run: dotnet publish Materal.Gateway.WebAPI/Materal.Gateway.WebAPI.csproj --configuration Release --output Application/Materal.Gateway.WebAPI

      - name: 设置时间戳
        id: timestamp
        run: echo "ts=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: 压缩后端
        run: cd Application && zip -r Materal.Gateway.WebAPI${{ steps.timestamp.outputs.ts }}.zip Materal.Gateway.WebAPI

      - name: 删除旧 Release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const sortedReleases = releases.data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const toDelete = sortedReleases.slice(1);
            for (const release of toDelete) {
              console.log(`Deleting release: ${release.tag_name}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id
              });
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`
                });
              } catch (e) {
                console.log(`Tag ${release.tag_name} may already be deleted`);
              }
            }
            console.log(`Deleted ${toDelete.length} old releases, kept 2 latest`);

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ steps.timestamp.outputs.ts }}
          name: Materal.Gateway Release ${{ steps.timestamp.outputs.ts }}
          draft: false
          prerelease: false
          files: |
            Application/Materal.Gateway.WebAPI${{ steps.timestamp.outputs.ts }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 发布到 NuGet
        run: |
          if [ -z "$(ls -A ../Packages/*.nupkg 2>/dev/null)" ]; then
            echo "没有需要发布的包"
            exit 0
          fi
          for nupkg in ../Packages/*.nupkg; do
            echo "正在发布: $nupkg"
            dotnet nuget push "$nupkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --skip-duplicate
          done
